name: Build Resume

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install -g resume-cli

      - run: mkdir -p public
      - run: resume export public/resume.pdf --theme jsonresume-theme-even

      - run: |
          git config
