name: Export CV to PDF

on:
  push:
    branches: [main, cv-*]
    paths:
      - 'cv.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-cv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab

      - name: Generate CV PDF
        run: python scripts/generate_cv_pdf.py

      - name: Commit and push PDF
        run: |
          git config user.name "CV Bot"
          git config user.email "cv-bot@example.com"
          git add Dimple_Shukla_CV.pdf
          git commit -m "chore: update CV PDF from cv.json [skip ci]" || echo "No changes to commit"
          git push

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Dimple_Shukla_CV.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
